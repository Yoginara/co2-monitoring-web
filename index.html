<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CO₂ Board - Supabase Cloud</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* Utility class custom untuk transisi section */
    .content-section {
      display: none;
    }

    .content-section.active {
      display: block;
    }
  </style>
</head>

<body class="bg-gray-100 font-sans antialiased flex flex-col md:flex-row min-h-screen">

  <aside
    class="w-full md:w-64 bg-slate-900 text-white flex flex-col p-6 md:fixed md:top-0 md:left-0 md:h-screen shadow-lg z-10">
    <div class="flex items-center justify-center md:justify-start gap-3 pb-6 border-b border-slate-700">
      <span class="text-2xl">📊</span>
      <h2 class="text-xl font-bold tracking-wider">CO₂ Board</h2>
    </div>
    <nav class="mt-6 flex-1">
      <ul class="space-y-2 flex flex-row md:flex-col justify-around md:justify-start w-full">
        <li class="w-full">
          <button onclick="showSection('dashboard')"
            class="w-full text-left px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white transition duration-200 font-medium text-sm md:text-base">
            🖥️ Dashboard
          </button>
        </li>
        <li class="w-full">
          <button onclick="showSection('historis')"
            class="w-full text-left px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white transition duration-200 font-medium text-sm md:text-base">
            📅 Data Historis
          </button>
        </li>
      </ul>
    </nav>
  </aside>

  <main class="flex-1 p-4 md:p-8 md:ml-64 transition-all duration-300">

    <section id="dashboard"
      class="content-section active bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-200">
      <div class="border-b border-gray-200 pb-4 mb-6">
        <h1 class="text-2xl md:text-3xl font-bold text-gray-800">Monitoring CO₂ Basement</h1>
        <p id="connectionStatus" class="text-sm text-amber-600 mt-1 font-medium flex items-center gap-1">
          🔄 Status Koneksi: Menghubungkan ke Supabase Cloud...
        </p>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
        <div class="p-6 bg-slate-50 border border-gray-200 rounded-xl">
          <p class="text-sm font-medium text-gray-500 uppercase tracking-wider">Nilai CO₂ Saat Ini</p>
          <p class="text-3xl md:text-4xl font-extrabold text-slate-800 mt-2" id="latestValue">-- ppm</p>
        </div>
        <div class="p-6 bg-slate-50 border border-gray-200 rounded-xl flex flex-col justify-center">
          <p class="text-sm font-medium text-gray-500 uppercase tracking-wider mb-2">Status Udara</p>
          <div>
            <span class="inline-block text-sm font-bold px-4 py-1.5 rounded-full bg-gray-200 text-gray-700"
              id="statusLabel">
              Memuat...
            </span>
          </div>
        </div>
      </div>

      <div class="bg-gray-50 p-4 rounded-xl border border-gray-200 mb-6">
        <h3 class="text-sm font-semibold text-gray-700 mb-3">Filter Waktu Grafik</h3>
        <div class="flex flex-col sm:flex-row flex-wrap gap-4 items-end">
          <div class="w-full sm:w-auto flex-1">
            <label for="startTime" class="block text-xs font-bold text-gray-600 uppercase mb-1">Dari:</label>
            <input type="datetime-local" id="startTime"
              class="w-full p-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" />
          </div>
          <div class="w-full sm:w-auto flex-1">
            <label for="endTime" class="block text-xs font-bold text-gray-600 uppercase mb-1">Sampai:</label>
            <input type="datetime-local" id="endTime"
              class="w-full p-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" />
          </div>
          <div class="flex gap-2 w-full sm:w-auto">
            <button onclick="applyTimeFilter()"
              class="flex-1 sm:flex-initial bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm px-4 py-2 rounded-lg shadow-sm transition">Terapkan</button>
            <button onclick="resetGraph()"
              class="flex-1 sm:flex-initial bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold text-sm px-4 py-2 rounded-lg transition">Reset</button>
          </div>
        </div>
      </div>

      <div>
        <h2 class="text-lg font-bold text-gray-700 mb-4">Grafik Kadar CO₂</h2>
        <div class="relative w-full max-w-4xl mx-auto h-[350px] md:h-[400px]">
          <canvas id="co2Chart"></canvas>
        </div>
      </div>
    </section>

    <section id="historis" class="content-section bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-200">
      <div class="border-b border-gray-200 pb-4 mb-6">
        <h2 class="text-2xl md:text-3xl font-bold text-gray-800">Data Historis Pengamatan</h2>
        <p class="text-sm text-gray-500 mt-1">Log keseluruhan rekaman sensor CO₂ dari database</p>
      </div>

      <form id="filterForm"
        class="bg-gray-50 p-4 rounded-xl border border-gray-200 mb-6 flex flex-col sm:flex-row flex-wrap gap-4 items-end">
        <div class="w-full sm:w-auto flex-1">
          <label for="startDate" class="block text-xs font-bold text-gray-600 uppercase mb-1">Dari Tanggal:</label>
          <input type="date" id="startDate" required
            class="w-full p-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" />
        </div>
        <div class="w-full sm:w-auto flex-1">
          <label for="endDate" class="block text-xs font-bold text-gray-600 uppercase mb-1">Sampai Tanggal:</label>
          <input type="date" id="endDate" required
            class="w-full p-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none" />
        </div>
        <button type="submit"
          class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm px-5 py-2 rounded-lg shadow-sm transition">Tampilkan</button>
      </form>

      <div class="flex justify-end mb-4">
        <button id="downloadBtn" onclick="downloadCSV()"
          class="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold text-sm px-4 py-2 rounded-lg shadow-sm transition flex items-center gap-1">
          📥 Download CSV (Excel)
        </button>
      </div>

      <div class="overflow-x-auto border border-gray-200 rounded-xl shadow-sm">
        <table class="w-full border-collapse bg-white text-left text-sm text-gray-600">
          <thead class="bg-gray-50 text-xs font-bold uppercase text-gray-700 border-b border-gray-200">
            <tr>
              <th scope="col" class="px-6 py-3 text-center">Waktu</th>
              <th scope="col" class="px-6 py-3 text-center">Kadar CO₂ (ppm)</th>
            </tr>
          </thead>
          <tbody id="dataTable" class="divide-y divide-gray-200">
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>

</html>
